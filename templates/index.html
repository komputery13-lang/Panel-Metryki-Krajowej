<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprawdź to</title>
    <link rel="icon" type="image/png" href="Zrzut ekranu 2026-06-24 120643.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
            color: #111827;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }
        .card {
            background: #ffffff;
            padding: 30px;
            border-radius: 20px;
            border: 3px solid #111827; /* Identyczna potężna czarna ramka */
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            max-width: 720px;
            width: 95%;
            box-sizing: border-box;
        }
        .main-title {
            font-size: 36px;
            font-weight: 900;
            letter-spacing: -1.5px;
            color: #111827;
            text-align: center;
            margin-bottom: 25px;
            margin-top: 0;
        }
        .form-group {
            margin-bottom: 18px;
            text-align: left;
        }
        label {
            display: block;
            font-size: 13px;
            font-weight: 700;
            color: #111827;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
        /* Nowe, dopasowane wizualnie pola tekstowe */
        input {
            width: 100%;
            padding: 14px 18px;
            background: #ffffff;
            border: 3px solid #111827;
            border-radius: 12px;
            font-size: 16px;
            font-family: inherit;
            font-weight: 700;
            color: #111827;
            box-sizing: border-box;
            box-shadow: 4px 4px 0px #111827;
            transition: transform 0.1s ease;
        }
        input:focus {
            outline: none;
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #111827;
        }
        button {
            width: 100%;
            padding: 16px;
            background-color: #111827;
            color: #ffffff;
            border: 3px solid #111827;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 900;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 15px;
            box-shadow: 4px 4px 0px #374151;
        }
        button:hover {
            background-color: #1f2937;
        }
        .alert {
            color: #b91c1c;
            background-color: #fef2f2;
            border: 3px solid #b91c1c;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            font-size: 13px;
            font-weight: 700;
        }
    </style>
</head>
<body>
<div class="card">
    <h1 class="main-title">Panel Metryki Krajowej</h1>
    {% if blad %}
        <div class="alert">{{ blad }}</div>
    {% endif %}
    <form action="/wynik" method="POST">
        <div class="form-group">
            <label for="wiek">Podaj swój dokładny wiek (0 - 100 lat)</label>
            <input type="number" id="wiek" name="wiek_uzytkownika" min="0" max="100" placeholder="np. 25" required>
        </div>
        <div class="form-group">
            <label for="brutto">Dowolne wynagrodzenie miesięczne Brutto (zł)</label>
            <input type="number" id="brutto" name="wynagrodzenie_brutto" min="0" step="any" placeholder="np. 5431.25">
        </div>
        <button type="submit">Generuj raport i strukturę</button>
    </form>
</div>
</body>
</html>
